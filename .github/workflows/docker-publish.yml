name: Docker Publish

on:
  push:
    branches:
      - dev
    tags: ['v*.*.*']
  pull_request:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ $GITHUB_REF =~ ^refs/tags/v ]]; then
            VERSION=${GITHUB_REF_NAME#v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "model_version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=1.0.0-SNAPSHOT" >> $GITHUB_OUTPUT
            echo "model_version=1.0.0-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Build ID
        run: |
          SHORT_COMMIT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          BUILD_ID="backend-${GITHUB_REF_NAME}-${SHORT_COMMIT}-$(date +'%Y%m%d%H%M')"
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ossemaabd95/stackvault
          tags: |
            type=raw,value=${{ env.BUILD_ID }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODEL_VERSION=${{ steps.version.outputs.model_version }}
            GITHUB_ACTOR=${{ vars.GH_ACTOR }}
            GITHUB_TOKEN=${{ secrets.GH_TOKEN }}